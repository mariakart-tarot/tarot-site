<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Таро | Мари</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: #fff;
      font-family: 'Playfair Display', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 14px;
      width: 260px;
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Таро & Разборы</h1>
    <p>Говорю не то, что приятно. А то, что происходит.</p>

    <a class="btn" href="#">Записаться</a>
    <a class="btn" href="#">Telegram</a>
    <a class="btn" href="#">Instagram</a>
  </div>

</body>
</html>
